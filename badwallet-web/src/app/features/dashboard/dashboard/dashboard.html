<h2>Tableau de bord</h2>

<div class="cards">

  <mat-card class="card balance">

    <mat-icon>account_balance_wallet</mat-icon>

    <h3>Solde actuel</h3>

    <h1>{{ balance?.balance ?? 0 }} FCFA</h1>

  </mat-card>

  <mat-card class="card">

    <mat-icon>swap_horiz</mat-icon>

    <p>25 opérations</p>

  </mat-card>

  <mat-card class="card">

    <mat-icon>payments</mat-icon>

    <h3>Dépenses</h3>

    <p>120 000 FCFA</p>

  </mat-card>

</div>
